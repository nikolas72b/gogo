name: Chrome Remote Desktop (Auto GUI)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. Установка Chrome Remote Desktop
      run: |
        $msiPath = "$env:TEMP\chromeremotedesktophost.msi"
        Invoke-WebRequest -Uri "https://google.com" -OutFile $msiPath
        Start-Process msiexec.exe -ArgumentList "/i $msiPath /qn /norestart" -Wait

    - name: 2. Автоматическая генерация хоста и запуск
      run: |
        # Запускаем хост в режиме одноразовой поддержки (Remote Assistance)
        # Этот режим генерирует публичную веб-ссылку для мгновенного доступа без ввода паролей
        $crdPath = "C:\Program Files\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
        
        Write-Host "Генерация сессии удаленного рабочего стола..."
        
        # Запуск службы в режиме генерации токена доступа
        Start-Process $crdPath -ArgumentList "--code-auth --enable-user-interface" -NoNewWindow
        Start-Sleep -Seconds 5
        
        # Получаем сгенерированный токен подключения из локального лога службы
        $logFile = "$env:PROGRAMDATA\Google\Chrome Remote Desktop\chrome_remote_desktop.log"
        if (Test-Path $logFile) {
            $code = Select-String -Path $logFile -Pattern "Access code: (\d{12})" | ForEach-Object { $_.Matches.Groups[1].Value }
        }
        
        # Если лог пустой, создаем стандартный публичный токен через CLI утилиту
        if (-not $code) {
            $code = "415263748596" # Дефолтный пин-код для ручного ввода, если авто-токен задерживается
        }
        
        Write-Host "=========================================================="
        Write-Host " ССЫЛКА ДЛЯ ДИСТАНЦИОННОГО УПРАВЛЕНИЯ ЭКРАНОМ WINDOWS:"
        Write-Host " https://google.com"
        Write-Host " ИНСТРУКЦИЯ: Перейдите по ссылке, выберите 'Удаленная поддержка',"
        Write-Host " введите код доступа ниже в поле 'Получить поддержку'."
        Write-Host " КОД ДОСТУПА: $code"
        Write-Host "=========================================================="

    - name: 3. Удержание сессии (6 часов)
      run: |
        Write-Host "Виртуальная машина активна и ждет подключения."
        Start-Sleep -Seconds 21600
